<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВХОД</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; width: 280px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 18px; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #00B956; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔒 Вход</h2>
        <input type="password" id="psw" placeholder="****" inputmode="numeric">
        <button onclick="go()">ВОЙТИ</button>
        <p id="err" style="color:red; display:none;">Ошибка!</p>
    </div>
    <script>
        function go() {
            if(document.getElementById('psw').value === "3257") {
                window.location.href = "panel.html";
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }
    </script>
</body>
</html>
