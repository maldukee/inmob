<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет Зарплаты v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen-login" class="win">
        <h2>КТО НА СМЕНЕ?</h2>
        <div class="login-buttons">
            <button onclick="app.start('ИВАН')">👤 ИВАН</button>
            <button onclick="app.start('НИКИТА')">👤 НИКИТА</button>
        </div>
    </div>

    <div id="screen-main" class="win" style="display:none;">
        <h3 id="display-user"></h3>

        <button class="calendar-toggle-btn" onclick="app.toggleCalendar()">📅 ГРАФИК И ДЕТАЛИ</button>

        <div id="calendar-container" style="display:none;">
            <div id="calendar-grid" class="grid"></div>
        </div>

        <div class="zp-box">
            <span>Ваш заработок:</span>
            <div id="display-zp" class="zp-value">0 ₽</div>
        </div>

        <div id="day-details" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close" onclick="app.closeDetails()">&times;</span>
                <h3 id="detail-date">--</h3>
                <hr>
                <div id="detail-info"></div>
                <button class="delete-btn" id="delete-day-btn">❌ ОЧИСТИТЬ ДЕНЬ</button>
            </div>
        </div>

        <div id="admin-link-wrapper" class="admin-link" onclick="app.toggleAdmin()" style="display:none;">⚙️ АДМИН-ПАНЕЛЬ</div>

        <div id="admin-box" class="adm" style="display:none;">
            <h4>Редактор дня</h4>
            <input type="number" id="adm-day" placeholder="Число (1-31)">
            <input type="number" id="adm-tov" placeholder="Товар ₽">
            <input type="number" id="adm-sim" placeholder="Симки шт">
            <input type="number" id="adm-usl" placeholder="Услуги ₽">
            <button class="save-admin" onclick="app.handleAdminSave()">СОХРАНИТЬ</button>
        </div>

        <p class="exit-btn" onclick="location.reload()">Выход</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
