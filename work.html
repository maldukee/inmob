<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Блокнот - INFINITY</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 380px; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .user-info { font-weight: 900; font-size: 13px; text-transform: uppercase; color: #888; }
        .note-card { background: #f9f9f9; border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        #note-area { width: 100%; height: 180px; border: none; background: transparent; font-size: 16px; outline: none; resize: none; color: #333; font-family: inherit; }
        .salary-badge { background: #111; color: #fff; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .salary-main b { font-size: 34px; color: #00B956; display: block; line-height: 1; margin-top: 5px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; text-align: center; text-decoration: none; }
        .btn-save { background: #00B956; color: white; }
        .btn-stats { background: #f0f0f0; color: #666; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="user-info" id="user-display">Загрузка...</span>
        <a href="index.html" style="color:#ccc; text-decoration:none; font-size:12px;">ВЫХОД</a>
    </div>

    <div class="note-card">
        <textarea id="note-area" placeholder="чехол 500, yota, мпл..." oninput="calculate()"></textarea>
    </div>

    <div class="salary-badge">
        <div class="salary-main">
            <span style="font-size: 9px; color: #555; font-weight: bold;">ЗП СЕГОДНЯ</span>
            <b id="total-amount">0 ₽</b>
        </div>
    </div>

    <div class="btn-group">
        <button type="button" class="btn btn-save" onclick="saveData()">Записать</button>
        <a href="stats.html" class="btn btn-stats">График</a>
    </div>
    
    <div id="admin-zone"></div>
</div>

<script>
    const user = localStorage.getItem('currentUser') || "Сотрудник";
    document.getElementById('user-display').innerText = user;

    function getTodayKey() {
        const d = new Date();
        return user + "_" + d.getFullYear() + "_" + d.getMonth() + "_" + d.getDate();
    }

    // Загрузка текста при входе
    window.onload = function() {
        const key = getTodayKey();
        const saved = JSON.parse(localStorage.getItem('Inf_Data')) || {};
        if (saved[key]) {
            document.getElementById('note-area').value = saved[key].rawText || "";
            calculate();
        }
    };

    function calculate() {
        const text = document.getElementById('note-area').value.toLowerCase();
        let report = { plenki: 0, uslugi: 0, tovar: 0, sim: 0, total: 0, rawText: text };

        // 1. Пленки (250 нал / 200 бн)
        report.plenki += (text.match(/пленка нал/g) || []).length * 250;
        report.plenki += (text.match(/пленка бн/g) || []).length * 200;
        
        // 2. Услуги (50%)
        const uslPattern = /(?:нс|настр|услуга)\s*(\d+)/g;
        let m; while ((m = uslPattern.exec(text)) !== null) { report.uslugi += Math.round(parseInt(m[1]) * 0.5); }

        // 3. Товар (10%)
        const tovPattern = /(?:кабель|сзу|азу|бзу|повербанк|чехол|держатель|часы|зарядка для часов|батарейка|батарейки|мышка|попсокет|картхолдер|наушники)\s*(\d+)/g;
        let t; while ((t = tovPattern.exec(text)) !== null) { report.tovar += Math.round(parseInt(t[1]) * 0.1); }

        // 4. Сим-карты
        report.sim += (text.
match(/минимум(?!\s*плюс|\s*\+|\s*plus)|кидс|kids|мпл|клон/g) || []).length * 100;
        report.sim += (text.match(/интернет|35гб|yota|минимум\s*плюс|минимум\s*\+|минимум\+/g) || []).length * 300;
        report.sim += (text.match(/максимум/g) || []).length * 500;
        report.sim += (text.match(/вип|vip|60гб|100гб|300гб|премиум/g) || []).length * 600;

        report.total = report.plenki + report.uslugi + report.tovar + report.sim;
        document.getElementById('total-amount').innerText = report.total + " ₽";
        return report;
    }

    function saveData() {
        const report = calculate();
        const key = getTodayKey();
        
        let data = JSON.parse(localStorage.getItem('Inf_Data')) || {};
        data[key] = report;
        localStorage.setItem('Inf_Data', JSON.stringify(data));

        let sch = JSON.parse(localStorage.getItem('Inf_Schedule')) || {};
        sch[key] = 'work';
        localStorage.setItem('Inf_Schedule', JSON.stringify(sch));

        alert("✅ СОХРАНЕНО: " + report.total + " ₽");
    }
// Проверка на админа (Никита)
    if (user.toLowerCase() === 'никита') {
        const adminZone = document.getElementById('admin-zone');
        adminZone.innerHTML = `
            <a href="admin.html" class="btn" style="background: #111; color: #00B956; margin-top: 10px; width: 100%; display: block; box-sizing: border-box; text-decoration: none;">
                ⚙️ ПАНЕЛЬ АДМИНИСТРАТОРА
            </a>
        `;
    }
</script>
</body>
</html>
